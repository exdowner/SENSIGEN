<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SensiGen</title>
    <style>
        :root {
            --primary: #ff0000;
            --background: #0b0b0b;
            --surface: #151515;
            --text-main: #ffffff;
            --text-sub: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .panel {
            width: 380px;
            background: var(--background);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.1);
        }

        /* --- MIRA GIRATÓRIA --- */
        .loader-container {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .crosshair {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 50%;
            position: absolute;
            animation: rotate 3s linear infinite;
        }

        .crosshair::before { content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 10px; background: var(--primary); transform: translateX(-50%); }
        .crosshair::after { content: ''; position: absolute; bottom: 0; left: 50%; width: 2px; height: 10px; background: var(--primary); transform: translateX(-50%); }

        .crosshair-h {
            width: 100%;
            height: 100%;
            position: absolute;
            animation: rotate 3s linear infinite;
        }

        .crosshair-h::before { content: ''; position: absolute; left: 0; top: 50%; width: 10px; height: 2px; background: var(--primary); transform: translateY(-50%); }
        .crosshair-h::after { content: ''; position: absolute; right: 0; top: 50%; width: 10px; height: 2px; background: var(--primary); transform: translateY(-50%); }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 { font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }

        input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            padding: 14px;
            color: #fff;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
        }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }

        .mode-btn {
            flex: 1;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: var(--text-sub);
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .mode-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(255, 0, 0, 0.1); }

        .generate-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            color: #fff;
            font-weight: 900;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- MENSAGEM DE ERRO --- */
        #error-msg {
            color: var(--primary);
            font-size: 0.8rem;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }

        /* --- GRID DE RESULTADOS --- */
        .results-grid {
            margin-top: 25px;
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .sensi-card {
            background: #151515;
            padding: 12px;
            border-radius: 8px;
            border-bottom: 2px solid var(--primary);
            text-align: left;
        }

        .sensi-card label { display: block; color: #555; font-size: 0.6rem; text-transform: uppercase; font-weight: 800; }
        .sensi-card span { font-size: 1.2rem; font-weight: bold; color: #fff; }

    </style>
</head>
<body>

    <div class="panel">
        <div class="loader-container">
            <div class="crosshair"></div>
            <div class="crosshair-h"></div>
            <div style="width: 4px; height: 4px; background: red; border-radius: 50%;"></div>
        </div>

        <h1>SensiGen</h1>

        <input type="text" id="deviceInput" placeholder="Ex: iPhone 13, Poco X3, S22...">

        <div class="btn-group">
            <button class="mode-btn" onclick="setMode(this)">Instaplayer</button>
            <button class="mode-btn" onclick="setMode(this)">Freestyle</button>
        </div>

        <button class="generate-btn" onclick="process()">Gerar Sensibilidade</button>

        <p id="error-msg">Dispositivo não encontrado!</p>

        <div class="results-grid" id="res">
            <div class="sensi-card"><label>Geral</label><span id="v1">0</span></div>
            <div class="sensi-card"><label>Mira Red Dot</label><span id="v2">0</span></div>
            <div class="sensi-card"><label>Mira 2x</label><span id="v3">0</span></div>
            <div class="sensi-card"><label>Mira 4x</label><span id="v4">0</span></div>
            <div class="sensi-card"><label>Mira AWM</label><span id="v5">0</span></div>
            <div class="sensi-card"><label>Olhadinha</label><span id="v6">0</span></div>
        </div>
    </div>

    <script>
        // Lista de Dispositivos (Pode adicionar quantos quiser aqui)
        const devices = [
            "iphone 8", "iphone x", "iphone 11", "iphone 12", "iphone 13", "iphone 14", "iphone 15",
            "galaxy s10", "galaxy s20", "galaxy s21", "galaxy s22", "galaxy s23", "galaxy a10", "galaxy a32", "galaxy a54",
            "poco x3", "poco f3", "poco x4", "poco f5", "redmi note 8", "redmi note 9", "redmi note 10", "redmi note 11", "redmi note 12",
            "moto g60", "moto g100", "moto edge 30", "moto g52", "realme gt", "realme 9", "rog phone 5", "rog phone 6"
        ];

        let selected = false;

        function setMode(btn) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selected = true;
        }

        function process() {
            const input = document.getElementById('deviceInput').value.toLowerCase().trim();
            const error = document.getElementById('error-msg');
            const res = document.getElementById('res');

            error.style.display = 'none';
            res.style.display = 'none';

            // Verifica se o dispositivo está na lista ou se contém parte do nome
            const found = devices.some(d => input.includes(d) || d.includes(input));

            if (!input || !selected) {
                alert("Selecione o modo e digite o aparelho.");
                return;
            }

            if (!found || input.length < 3) {
                error.style.display = 'block';
                return;
            }

            // Simulação de "carregamento"
            document.querySelector('.crosshair').style.animationDuration = '0.3s';
            
            setTimeout(() => {
                document.querySelector('.crosshair').style.animationDuration = '3s';
                res.style.display = 'grid';
                
                const val = (min, max) => Math.floor(Math.random() * (max - min + 1) + min);
                
                document.getElementById('v1').innerText = val(95, 100);
                document.getElementById('v2').innerText = val(90, 99);
                document.getElementById('v3').innerText = val(85, 96);
                document.getElementById('v4').innerText = val(80, 94);
                document.getElementById('v5').innerText = val(20, 40);
                document.getElementById('v6').innerText = val(50, 80);
            }, 1000);
        }
    </script>
</body>
</html>
